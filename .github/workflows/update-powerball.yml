name: 🎱 Weekly Powerball Data Update

on:
  schedule:
    # Every Thursday at 11:00 PM AEST (13:00 UTC) — ~30 min after draw
    - cron: '0 13 * * 4'
  workflow_dispatch:
    # Allow manual trigger anytime

permissions:
  contents: write

jobs:
  update-powerball:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🔄 Fetch latest Powerball results & update HTML
        run: python .github/scripts/update_powerball.py

      - name: 📝 Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add powerball-au.html
          if git diff --staged --quiet; then
            echo "✅ No new draw data — file unchanged."
          else
            DRAW=$(grep -oP '(?<=DRAW #)\d+' powerball-au.html | head -1)
            DATE=$(date +'%d %b %Y')
            git commit -m "📊 Auto-update: Draw #${DRAW} (${DATE})"
            git push
            echo "🚀 Pushed update for Draw #${DRAW}"
          fi
